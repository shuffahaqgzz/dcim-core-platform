groups:
  - name: foundation-health
    rules:
      - alert: FoundationTargetDown
        expr: up == 0
        for: 30s
        labels: {severity: critical}
        annotations: {summary: "Synthetic foundation target unavailable"}
      - alert: PostgreSQLExporterBackendDown
        expr: pg_up == 0
        for: 30s
        labels: {severity: critical}
        annotations: {summary: "PostgreSQL exporter cannot reach backend"}
      - alert: KafkaBrokerNotActive
        expr: kafka_server_broker_state != 3
        for: 30s
        labels: {severity: warning}
        annotations: {summary: "Synthetic Kafka broker not active"}
  - name: foundation-capacity
    rules:
      - record: dcim_foundation:kafka_storage_ratio
        expr: sum(kafka_log_size_bytes) / 42949672960
      - alert: KafkaStorageSeventyPercent
        expr: dcim_foundation:kafka_storage_ratio >= 0.70
        labels: {severity: warning}
        annotations: {summary: "Kafka logical storage at 70 percent"}
      - alert: KafkaStorageEightyFivePercent
        expr: dcim_foundation:kafka_storage_ratio >= 0.85
        labels: {severity: high}
        annotations: {summary: "Kafka logical storage at 85 percent"}
      - alert: KafkaStorageNinetyPercent
        expr: dcim_foundation:kafka_storage_ratio >= 0.90
        labels: {severity: critical}
        annotations: {summary: "Kafka logical storage at 90 percent; smoke writes refused"}
