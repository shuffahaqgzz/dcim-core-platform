name: CI / Preflight

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Compile-check Python
        run: make compile

      - name: Run synthetic-only Phase 0 gates
        run: make phase0-check

  foundation-fast:
    name: synthetic foundation fast smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Bootstrap protected synthetic runtime
        env:
          DCIM_RUNTIME_ROOT: ${{ runner.temp }}/dcim-runtime
        run: make foundation-bootstrap

      - name: Run normalized policy and fast smoke
        env:
          DCIM_RUNTIME_ROOT: ${{ runner.temp }}/dcim-runtime
        run: make foundation-smoke

      - name: Stop synthetic foundation and preserve evidence for job lifetime
        if: always()
        env:
          DCIM_RUNTIME_ROOT: ${{ runner.temp }}/dcim-runtime
        run: make foundation-stop
